<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Meals&Miles</title>
        <link rel="stylesheet" href="../static/css/create.css"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-left">
              <img src="{{ url_for('static', filename='images/logo.png') }}" alt="LOGO" class="logo">  
            </div>

            <div class="nav-center">
                <h1 class="main-heading">Meals & Miles</h1>
                <h2>A place where you can share your meal experiences and travel stories</h2>
   
            </div>

            <div class="nav-right" id= "navRight">
                              
                <a href="/account">{{ current_user.username }}</a>
                <a href="{{ url_for('views.logout') }}">Logout</a>
                <a href="javascript:void(0);" class="icon" onclick="displayHamberger()">
                           <i class="fa fa-bars"></i>
                </a>
            </div>
        </nav>
         
        <section class="main">

            <div class="edit-post">

               <h2>Create a Post</h2>
                    <form action="{{ url_for('views.edit_post' , post_id=post.id) }}" method="POST" enctype="multipart/form-data" id="postForm">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" value="{{ post.title}}" required>
                    </div>

                    <div class="form-group">
                        <label for="content">Content</label>
                        <textarea id="content" name="content" rows="8" required >{{ post.content }} </textarea>
                    </div>

                    <div class="form-group">
                        <label for="image">Upload Image</label>
                        <input type="file" id="image" name="image" accept="image/*">  
                        
                    </div>

                    <button type="submit" class="submit-btn"> Save changes</button>
                    <button type="button" class="cancel-btn" onclick="window.location.href='/account'">Cancel </button>
                    </form>

            </div>
        </section>
        <footer class="footer">
            <div class="footer-icons">
                <a href="https://www.facebook.com/mealsandmiles">
                <i class="fab fa-facebook-f"></i>
                </a>
                <a href="https://www.instagram.com/_meals_and_miles/">
                <i class="fab fa-instagram"></i>
                </a>
                <a href="mailto:info@mealsandmiles.com" >
                <i class="fas fa-envelope"></i>
                </a>
                <p>Meals&Miles &copy; 2026 All Rights Reserved</p>
            </div>
        </footer>
        <script src="../static/js/create.js"></script>
        <script src="../static/js/login.js"></script>
    </body>
</html>
